<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto</title>
    <link rel="stylesheet" href="css/componentes.css">
</head>

<body>

   <!---->
  <header class="header">
    <h1>FakeStore</h1>
    <nav>
      <a href="index.html">Vitrine</a>
      <a href="admin.html">Cadastrar Produto</a>
      <a href="perfil.html">Minha Conta</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main>

    <!-- VOLTAR -->
    <section class="voltar">
      <a href="index.html">← Voltar à Vitrine</a>
    </section>

    <!-- DETALHE DO PRODUTO -->
    <section id="produto-detalhe">
      <div class="produto-container">

        <!-- IMAGEM DO PRODUTO-->
        <div class="produto-imagem">
          <img src="link da imagem do produto" alt="Produto">
        </div>

        <!-- INFOMAÇÃO DO PRODUTO -->
        <div class="produto-info">
          <h2>Nome do Produto</h2>

          <p class="preco">R$ 00,00</p>

          <p class="descricao">
            Aqui vai a descrição completa do produto. Esse texto será substituído pela API depois.
          </p>

          <span class="categoria">Categoria</span>

          <button class="btn-comprar">Comprar</button>
        </div>

      </div>
    </section>

    <!-- RELACIONADOS -->
    <section id="relacionados">
      <h2>Produtos Relacionados</h2>

      <div class="lista-relacionados">

        <!-- CARD EXEMPLO -->
        <div class="card">
          <img src="">
          <h3>Produto Exemplo</h3>
          <p>R$ 00,00</p>
          <button>Ver Detalhes</button>
        </div>

      </div>
    </section>

  </main>

  <!-- JS -->
  <script src="./js/ui/componentes.js"></script>
  <script src="./js/ui/detalhe.js"></script>

</body>
</html>
