<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine</title>
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
            <nav class="barra-navegacao">
                <div class="container-navegação">
                    <div class="marca-logo">Mercado</div>

                    <div class="menu-principal">
                        <a href="#" class="link-nav ativo">Inicio</a>
                        <a href="#" class="link-nav">Novidades</a>
                        <a href="#" class="link-nav">Sobre</a>
                    </div>

                    <div class="ferramentas-nav">
                        <div class="barra-lateral-busca">
                            <span class="material-symbols-outlined">Buscar</span>
                            <input type="text" placeholder="Buscar no catálogo">
                        </div>

                        <div class="icones-usuarios">
                            <span class="material-symbols-outlined" title="Favoritos">Favoritos</span>
                            <span class="material-symbols-outlined" title="Carrinho">Carrinho</span>
                            <span class="material-symbols-outlined" title="Minha Conta">Conta</span>
                        </div>
                    </div>
                </div>
            </nav>
   

    <main class="layout-principal">
        <aside class="barra-lateral">
            
            
        </aside>
        
        <section class="vitrine">
            <h2>Nossos Produtos</h2>

            <div id="produto-grid">
                <article class="card-produto">
                    <img src= "https://picsum.photos/300/200?random=1" alt="Produto exemplo" class="imagem-produto">
                    <div class="info-produto">
                        <h3 class="titulo-produto">Produto Exemplo 1</h3>
                        <p class="descricao-produto">Qualidade e estilo em um só produto.</p>

                        <div class="preco-produto">R$ 99,90</div>
                        <button class="btn-comprar">Comprar</button>
                    </div>
                </article>

                 <article class="card-produto">
                    <img src="https://picsum.photos/300/200?random=2" alt="Produto exemplo" class="imagem-produto">
                    <div class="info-produto">
                        <h3 class="titulo-produto">Produto Exemplo 2</h3>
                        <p class="descricao-produto">Qualidade e estilo em um só produto.</p>
                        <div class="preco-produto">R$ 149,90</div>
                        <button class="btn-comprar">Comprar</button>
                    </div>
                </article>
        </section>
    </main>

    <footer class="rodapé-principal">
        <p>2026 Loja de Produtos - Todos os direitos reservados</p>    
    </footer>

    <script src="js/api/config.js"></script>
    <script src="js/api/produtos.js"></script>
    <script src="js/ui/vitrine.js"></script>
</body>
</html>
