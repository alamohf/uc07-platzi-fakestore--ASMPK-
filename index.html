<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine</title>
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
    <header class="cabecalho-principal">
            <h1>Loja de Produtos</h1>
            <nav>
                <a href="produto.html"></a>
                <a href=""></a>
                <a href=""></a>
                <a href=""></a>
            </nav>
    </header>

    <main class="container-principal">
        <aside class="barra-lateral">
            <h3>CATEGORIAS</h3>
            <div class="opcoes">
                <p>Eletrônicos</p>
                <p>Roupas</p>
                <p>Casa</p>
            </div>

            <h3>FAIXA DE PREÇO</h3>
            <div class="faixa-preco">
                <span>R$ 20</span>
                <span>R$ 3.000+</span>
            </div>
            
        </aside>
        <section class="vitrine">
            <h2>Nossos Produtos</h2>

            <div id="produto-grid">
                <article class="card-produto">
                    <img src= "https://picsum.photos/300/200?random=1" alt="Produto exemplo" class="imagem-produto">
                    <div class="info-produto">
                        <h3 class="titulo-produto">Produto Exemplo 1</h3>
                        <p class="descricao-produto">Qualidade e estilo em um só produto.</p>

                        <div class="preco-produto">R$ 99,90</div>
                        <button class="btn-comprar">Comprar</button>
                    </div>
                </article>

                 <article class="card-produto">
                    <img src="https://picsum.photos/300/200?random=2" alt="Produto exemplo" class="imagem-produto">
                    <div class="info-produto">
                        <h3 class="titulo-produto">Produto Exemplo 2</h3>
                        <p class="descricao-produto">Qualidade e estilo em um só produto.</p>
                        <div class="preco-produto">R$ 149,90</div>
                        <button class="btn-comprar">Comprar</button>
                    </div>
                </article>
        </section>
    </main>

    <footer class="rodapé-principal">
        <p>2026 Loja de Produtos - Todos os direitos reservados</p>    
    </footer>

    <script src="js/api/config.js"></script>
    <script src="js/api/produtos.js"></script>
    <script src="js/ui/vitrine.js"></script>
</body>
</html>
