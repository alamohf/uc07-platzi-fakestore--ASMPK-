<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine</title>
    <link rel="stylesheet" href="">
</head>
<body>
    
    <header>
        <h1>Loja</h1>
    </header>

    <main>
        <section aria-label="Vitrine de produtos">

            <header>
                <h2>Vitrine</h2>
                <p>Produtos carregados via Platzi Fake Store API</p>
            </header>
            
            <article class="card-produto">
                <figure>
                    <img src="https://i.imgur.com/Qphac99.jpeg" alt="Tênis esportivo branco" />"
                </figure>
                
                <div class="corpo">
                    <span class="categoria">Calçados</span>
                    <h3>Tênis de Corrida</h3>
                </div>

                <footer>
                    <span class="preco">R$200</span>
                    <button type="button">Adicionar no carrinho</button>
                </footer>
            </article>

            <script src="produtos.js"></script>
        </section>
    </main>
</body>
</html>
