<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine - E-commerce Platzi</title>
    <link rel="stylesheet" href="css/base.css">
</head>
<body>

    <header>
        <h1>E-commerce Platzi</h1>
    </header>

    <main>

        <!-- Filtros -->
        <section class="filtros">
            <div class="botoes-filtro">
            <button class="filtro ativo">Todos</button>
            <button class="filtro">Novidades</button>
            <button class="filtro">Promoção</button>
            </div>
        </section>

        <!-- Vitrine -->
        <section class="vitrine">

            <header class="vitrine-cabecalho">
            <h2>Nossos Produtos</h2>
            <p>Seleção de produtos da Platzi Fake Store API.</p>
            </header>

            <!-- AQUI os produtos vão aparecer -->
            <div id="grid-produtos">
            <p id="status">Carregando produtos...</p>
            </div>

        </section>

    </main>
    <script src="js/api/config.js"></script>
    <script src="js/api/produtos.js"></script>
    <script src="js/ui/vitrine.js"></script>
</body>
</html>
